# ~/.config/tmux/tmux.conf
# ─────────────────────────────────────────────────────────────
#  Configuración de tmux · tema Catppuccin Mocha
# ─────────────────────────────────────────────────────────────

# ── General ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color (24-bit)
set -g focus-events on
set -g extended-keys on                     # deja pasar combos como Ctrl+Enter sin comérselos
set -s escape-time 10                         # sin lag con Esc en vim
set -g history-limit 50000                    # más scrollback
set -g display-time 2000                      # mensajes visibles 2s
set -g status-interval 5                      # refresca la barra cada 5s
set -g mouse on                               # ratón: seleccionar, scroll, resize
set -g set-clipboard on

# Numeración de ventanas/paneles desde 1 y re-numerar al cerrar
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Prefijo: Ctrl+Space ──────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Recargar configuración ───────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config recargada"

# ── Divisiones de paneles (mantienen el directorio actual) ───
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# Renombrar (atajos por defecto, aquí de recordatorio):
#   prefijo + ,   → renombrar ventana/tab
#   prefijo + $   → renombrar sesión
#   clic derecho sobre la tab → menú con Rename (ratón activado)

# ── Navegación entre paneles al estilo vim (h j k l) ─────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar paneles (repetible: mantén prefijo y pulsa varias veces)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Cambiar de ventana rápido (Alt+flechas, sin prefijo)
bind -n M-Left  previous-window
bind -n M-Right next-window

# ── Modo copia estilo vim ────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ─────────────────────────────────────────────────────────────
#  Plugins (TPM)
# ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # guarda/restaura sesiones
set -g @plugin 'tmux-plugins/tmux-continuum'   # autoguardado periódico

# ── Barra de estado · minimalista ────────────────────────────
# [ Sesión ]  1:zsh  2:vim   → recuadro azul + ventanas en texto plano
set -g status-position top
set -g status-justify left
set -g status-style 'bg=default,fg=#6c7086'    # fondo transparente
set -g status-left-length 40
set -g status-right-length 40

# Nombre de sesión: recuadro azul; se pone AMARILLO cuando el prefijo está activo
set -g status-left '#[fg=#11111b,bg=#{?client_prefix,#f9e2af,#74a8fc},bold] #S #[default]  '

# Ventanas: inactivas apagadas, la activa en azul brillante y negrita
setw -g window-status-format '#[fg=#6c7086]#I:#W'
setw -g window-status-current-format '#[fg=#74a8fc,bold]#I:#W'
setw -g window-status-separator '  '

# Derecha: vacía (limpia, como la referencia)
set -g status-right ''

# Bordes de panel a juego
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#74a8fc'

# Mensajes y modo copia con el mismo acento
set -g message-style 'fg=#11111b,bg=#74a8fc,bold'
setw -g mode-style 'fg=#11111b,bg=#74a8fc'

# ── resurrect / continuum ────────────────────────────────────
# Autoguardado activado, pero SIN auto-restaurar al abrir
# (tmux abre siempre limpio; restaura tú con  prefijo + Ctrl-r)
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# ─────────────────────────────────────────────────────────────
#  Inicializa TPM (debe ir SIEMPRE al final)
# ─────────────────────────────────────────────────────────────
run '~/.config/tmux/plugins/tpm/tpm'
