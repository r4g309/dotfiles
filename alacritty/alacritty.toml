###############################################################################
#  Alacritty — configuracion de r4g3
#  Migrada desde Konsole (perfil r4g3 + esquema "Sweet")
#  Shell: zsh + starship  |  KDE Wayland
###############################################################################

# Si algun dia divides la config en varios archivos, importalos aqui:
# general.import = ["~/.config/alacritty/otros.toml"]

# ------------------------------- Terminal -----------------------------------
[terminal.shell]
program = "/usr/bin/zsh"
args = ["--login"]

[env]
# alacritty tiene terminfo instalado, asi que dejamos TERM nativo (mas features).
# Si haces ssh a servers sin terminfo de alacritty y ves colores raros,
# cambia a "xterm-256color".
TERM = "alacritty"

# -------------------------------- Ventana -----------------------------------
[window]
opacity = 0.3            # transparencia (igual que tu Konsole: 0.96)
blur = true               # desenfoque del fondo (KWin / KDE Wayland)
dynamic_title = true      # el titulo cambia segun el programa
dynamic_padding = true    # reparte el padding sobrante uniformemente
decorations = "full"      # barra de titulo nativa de KDE
startup_mode = "Windowed"
title = "Alacritty"

[window.padding]
x = 12
y = 10

[window.dimensions]
columns = 110
lines = 30

# ------------------------------- Scrollback ---------------------------------
[scrolling]
history = 10000
multiplier = 3

# -------------------------------- Fuente ------------------------------------
# JetBrains Mono (igual que Konsole). Los iconos de lsd/nerd-font caen
# automaticamente a "Hack Nerd Font" via fontconfig.
[font]
size = 11.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.bold_italic]
family = "JetBrains Mono"
style = "Bold Italic"

# Pequeno ajuste de interlineado para que respire mejor
[font.offset]
x = 0
y = 2

[font.glyph_offset]
x = 0
y = 1

# -------------------------------- Cursor ------------------------------------
# Beam parpadeante (tu _fix_cursor de .zshrc hacia \e[5 q = beam blink)
[cursor]
blink_interval = 600
thickness = 0.16
unfocused_hollow = true

[cursor.style]
shape = "Beam"
blinking = "On"

# -------------------------------- Colores -----------------------------------
# Esquema "Sweet" exportado de Konsole
[colors.primary]
background = "#161925"
foreground = "#c3c7d1"
dim_foreground = "#5c6370"
bright_foreground = "#828997"

[colors.cursor]
text = "#161925"
cursor = "#f9dc5c"

[colors.vi_mode_cursor]
text = "#161925"
cursor = "#7cb7ff"

[colors.selection]
text = "CellForeground"
background = "#3a3f4b"

[colors.normal]
black   = "#282c34"
red     = "#ed254e"
green   = "#71f79f"
yellow  = "#f9dc5c"
blue    = "#7cb7ff"
magenta = "#c74ded"
cyan    = "#00c1e4"
white   = "#dcdfe4"

# Bright: identicos al esquema, salvo el negro (lo aclaro para que el
# texto "tenue" no se vuelva invisible) y el blanco (blanco puro).
[colors.bright]
black   = "#5c6370"
red     = "#ed254e"
green   = "#71f79f"
yellow  = "#f9dc5c"
blue    = "#7cb7ff"
magenta = "#c74ded"
cyan    = "#00c1e4"
white   = "#ffffff"

# --------------------------------- Bell -------------------------------------
[bell]
animation = "EaseOutExpo"
duration = 80
color = "#7cb7ff"

# --------------------------------- Hints ------------------------------------
# Ctrl+Shift+U para abrir la URL bajo el cursor; o Ctrl+click con el mouse.
[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
regex = '(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^ <>"\s{}^`]+'
mouse = { enabled = true, mods = "Control" }
binding = { key = "U", mods = "Control|Shift" }

# -------------------------------- Atajos ------------------------------------
[keyboard]
bindings = [
  # Copiar / Pegar
  { key = "C",      mods = "Control|Shift",  action = "Copy"             },
  { key = "V",      mods = "Control|Shift",  action = "Paste"            },
  { key = "Insert", mods = "Shift",          action = "PasteSelection"   },

  # Tamano de fuente
  { key = "Plus",   mods = "Control",        action = "IncreaseFontSize" },
  { key = "Equals", mods = "Control",        action = "IncreaseFontSize" },
  { key = "Minus",  mods = "Control",        action = "DecreaseFontSize" },
  { key = "Key0",   mods = "Control",        action = "ResetFontSize"    },

  # Ventanas / pantalla
  { key = "N",      mods = "Control|Shift",  action = "CreateNewWindow"  },
  { key = "Return", mods = "Control|Shift",  action = "SpawnNewInstance" },
  { key = "F11",                             action = "ToggleFullscreen" },

  # Scroll y limpieza
  { key = "L",        mods = "Control|Shift", action = "ClearHistory"                 },
  { key = "K",        mods = "Control|Shift", action = "ClearLogNotice"               },
  { key = "PageUp",   mods = "Shift",         action = "ScrollPageUp",   mode = "~Alt" },
  { key = "PageDown", mods = "Shift",         action = "ScrollPageDown", mode = "~Alt" },
  { key = "Home",     mods = "Shift",         action = "ScrollToTop",    mode = "~Alt" },
  { key = "End",      mods = "Shift",         action = "ScrollToBottom", mode = "~Alt" },

  # Modo Vi (navegar/seleccionar con teclado) y busqueda
  { key = "Space",  mods = "Control|Shift",  action = "ToggleViMode"     },
  { key = "F",      mods = "Control|Shift",  action = "SearchForward"    },
  { key = "B",      mods = "Control|Shift",  action = "SearchBackward"   },
]
